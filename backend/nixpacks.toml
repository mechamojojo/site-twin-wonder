# Deploy sem Docker: mesmo fluxo mínimo do Dockerfile (sem playwright install no CI — use imagem Docker para preview).
[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["npm ci"]

[phases.build]
cmds = ["npx prisma generate", "npm run build"]

[start]
cmd = "npx prisma migrate deploy && node dist/index.js"
